<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b5121b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Freestyle Parts">
<title>Tech Pro — Freestyle Parts Order</title>
<style>
:root{
  --red:#d71920;--deep:#8d0c13;--bg:#08090b;--panel:#14161a;--panel2:#1c1f24;
  --line:#30343b;--text:#f7f8fa;--muted:#aeb4be;--green:#4bc27b;--yellow:#f4c95d;
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at 10% 0,rgba(215,25,32,.22),transparent 34%),
             linear-gradient(180deg,#111318 0,var(--bg) 45%);
  min-height:100vh;padding-bottom:calc(86px + env(safe-area-inset-bottom));
}
button,input,select,textarea{font:inherit}
header{
  position:sticky;top:0;z-index:30;padding:calc(12px + env(safe-area-inset-top)) 15px 12px;
  background:linear-gradient(135deg,var(--red),var(--deep));box-shadow:0 8px 28px rgba(0,0,0,.45)
}
.header-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand-title{font-weight:950;font-size:20px;letter-spacing:.1px}
.brand-sub{font-size:12px;opacity:.86;margin-top:2px}
.cart-pill{border:1px solid rgba(255,255,255,.32);background:rgba(255,255,255,.14);padding:8px 11px;border-radius:999px;font-weight:850;white-space:nowrap}
main{max-width:1100px;margin:auto;padding:14px}
.view{display:none}.view.active{display:block}
.card{background:rgba(20,22,26,.97);border:1px solid var(--line);border-radius:17px;padding:15px;margin-bottom:13px;box-shadow:0 12px 30px rgba(0,0,0,.28)}
.hero{background:linear-gradient(135deg,rgba(215,25,32,.2),rgba(255,255,255,.025))}
h1,h2,h3{margin:0 0 9px} h1{font-size:25px} h2{font-size:20px}
.muted{color:var(--muted);font-size:14px;line-height:1.45}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.stat{border:1px solid var(--line);background:#0e1013;border-radius:999px;padding:7px 10px;font-size:13px}
.controls{display:grid;grid-template-columns:1fr 220px;gap:9px}
input,select,textarea{
  width:100%;border:1px solid var(--line);background:#0d0f12;color:var(--text);
  border-radius:12px;padding:12px;outline:none
}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(215,25,32,.18)}
button{
  border:0;border-radius:11px;padding:10px 12px;font-weight:850;color:white;cursor:pointer;
  background:linear-gradient(135deg,var(--red),var(--deep))
}
button.secondary{background:#2b2f36}
button.ghost{background:transparent;border:1px solid var(--line)}
button.small{padding:8px 10px;min-width:40px}
.part-list{margin-top:8px}
.part{
  display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center;
  padding:14px 0;border-top:1px solid var(--line)
}
.part:first-child{border-top:0}
.part-icon{
  width:58px;height:58px;border-radius:14px;display:grid;place-items:center;font-weight:950;font-size:18px;
  background:linear-gradient(145deg,#292d34,#111317);border:1px solid var(--line);color:#fff
}
.part-name{font-weight:900;line-height:1.2;margin-bottom:5px}
.part-num{font-size:14px;font-weight:850}
.part-fit{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.35}
.qty{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:9px}
.qty input{width:62px;text-align:center;padding:8px;margin:0}
.star{font-size:22px;background:transparent;border:1px solid var(--line);padding:7px 10px}
.badge{display:inline-block;border:1px solid rgba(215,25,32,.45);background:rgba(215,25,32,.14);padding:4px 7px;border-radius:999px;font-size:11px;margin:4px 4px 0 0}
.order-line{display:grid;grid-template-columns:1fr auto;gap:10px;padding:13px 0;border-top:1px solid var(--line)}
.order-line:first-child{border-top:0}
.order-name{font-weight:900}.order-meta{font-size:13px;color:var(--muted);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.actions button{margin:0}
pre{white-space:pre-wrap;background:#0d0f12;border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--text);line-height:1.45}
.empty{text-align:center;padding:25px 10px;color:var(--muted)}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:40;padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:rgba(12,13,16,.95);backdrop-filter:blur(16px);border-top:1px solid var(--line)
}
.bottom-nav-inner{max-width:700px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.navbtn{background:transparent;border:0;color:var(--muted);padding:8px 4px;font-size:12px;box-shadow:none}
.navbtn span{display:block;font-size:20px;margin-bottom:2px}.navbtn.active{color:white;background:#252930}
.machine-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.machine{background:#1f2329;border:1px solid var(--line);text-align:left;padding:13px}
.machine strong{display:block}.machine small{display:block;color:var(--muted);margin-top:4px}
details{border-top:1px solid var(--line);padding:10px 0}
summary{cursor:pointer;font-weight:800}
.hidden{display:none!important}
@media(max-width:700px){
  .controls,.grid2,.actions{grid-template-columns:1fr}
  .part{grid-template-columns:50px 1fr}.part-icon{width:50px;height:50px}
  .part>.star{grid-column:2;justify-self:start}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div><div class="brand-title">Tech Pro</div><div class="brand-sub">Freestyle Parts Order</div></div>
    <div class="cart-pill" id="cartPill">0 items</div>
  </div>
</header>

<main>
<section id="viewSearch" class="view active">
  <div class="card hero">
    <h1>Freestyle parts, ready to order</h1>
    <div class="muted">Search the built-in catalog from the eight Freestyle machines supplied for this proof version.</div>
    <div class="stats">
      <span class="stat" id="partCount"></span>
      <span class="stat">8 Freestyle models</span>
      <span class="stat">Works offline</span>
    </div>
  </div>
  <div class="card">
    <div class="controls">
      <input id="search" placeholder="Search name, part number, CONA, machine, or section…" autocomplete="off">
      <select id="modelFilter"></select>
    </div>
    <div class="muted" id="resultStatus"></div>
    <div id="results" class="part-list"></div>
  </div>
</section>

<section id="viewMachines" class="view">
  <div class="card">
    <h2>Browse by machine</h2>
    <div class="muted">Tap a model to filter the catalog.</div>
    <div id="machineGrid" class="machine-grid" style="margin-top:12px"></div>
  </div>
</section>

<section id="viewFavorites" class="view">
  <div class="card">
    <h2>Favorites</h2>
    <div id="favorites"></div>
  </div>
</section>

<section id="viewOrder" class="view">
  <div class="card">
    <h2>Current order</h2>
    <div id="orderList"></div>
  </div>
  <div class="card">
    <div class="grid2">
      <div><label>Order date</label><input id="orderDate" type="date"></div>
      <div><label>Send to</label><input id="recipient" type="email" value="Masonmentzer2001@gmail.com"></div>
    </div>
    <label>Optional notes</label>
    <textarea id="notes" rows="3" placeholder="Truck stock, urgent, location, etc."></textarea>
    <h3>Email preview</h3>
    <pre id="preview"></pre>
    <div class="actions">
      <button onclick="openEmail()">Open Email</button>
      <button class="secondary" onclick="copyEmail()">Copy Text</button>
      <button class="ghost" onclick="clearOrder()">Clear Order</button>
    </div>
  </div>
</section>
</main>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="navbtn active" data-view="Search"><span>⌕</span>Search</button>
    <button class="navbtn" data-view="Machines"><span>▦</span>Machines</button>
    <button class="navbtn" data-view="Favorites"><span>☆</span>Favorites</button>
    <button class="navbtn" data-view="Order"><span>▣</span>Order</button>
  </div>
</div>

const MODELS = ["3100 Counter Electric", "4000 Flex Countertop", "7000 Ice Combo", "7100 Ice Combo", "8000 Crew-Serve", "8100 Crew-Serve", "9000 Self-Serve", "9100 Self-Serve"];
const KEY = {order:"tpFreestyleOrder1",fav:"tpFreestyleFav1",email:"tpFreestyleEmail1",date:"tpFreestyleDate1",notes:"tpFreestyleNotes1"};
let order = JSON.parse(localStorage.getItem(KEY.order)||"{}");
let favorites = JSON.parse(localStorage.getItem(KEY.fav)||"[]");

const $ = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
const today = () => {const d=new Date(),o=d.getTimezoneOffset();return new Date(d-o*60000).toISOString().slice(0,10)};
const initials = name => name.split(/[\s,/-]+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase();

function save(){
  localStorage.setItem(KEY.order,JSON.stringify(order));
  localStorage.setItem(KEY.fav,JSON.stringify(favorites));
}
function byNumber(num){return CATALOG.find(p=>p.part_number===num)}
function selectedQty(num){return order[num]?.qty||0}

function partCard(p){
  const div=document.createElement("div");div.className="part";
  const fit=p.models.slice(0,3).map(m=>`<span class="badge">${esc(m.replace(/ (Ice Combo|Crew-Serve|Self-Serve|Counter Electric|Flex Countertop)$/,""))}</span>`).join("");
  div.innerHTML=`
    <div class="part-icon">${esc(initials(p.name))}</div>
    <div>
      <div class="part-name">${esc(p.name)}</div>
      <div class="part-num">Part # ${esc(p.part_number)}</div>
      <div class="part-fit">${fit}${p.models.length>3?`<span class="badge">+${p.models.length-3}</span>`:""}</div>
      <div class="qty">
        <button class="small" onclick="changeQty('${esc(p.part_number)}',-1)">−</button>
        <input type="number" min="0" value="${selectedQty(p.part_number)}" onchange="setQty('${esc(p.part_number)}',this.value)">
        <button class="small" onclick="changeQty('${esc(p.part_number)}',1)">+</button>
        <button class="small secondary" onclick="changeQty('${esc(p.part_number)}',1)">Add</button>
      </div>
    </div>
    <button class="star" onclick="toggleFavorite('${esc(p.part_number)}')">${favorites.includes(p.part_number)?"★":"☆"}</button>`;
  return div;
}

function renderSearch(){
  const q=$("search").value.trim().toLowerCase();
  const model=$("modelFilter").value;
  let items=CATALOG.filter(p=>{
    const hay=[p.name,p.part_number,p.cona,...p.models,...p.locations].join(" ").toLowerCase();
    return (!q||hay.includes(q))&&(!model||p.models.includes(model));
  });
  $("resultStatus").textContent=`${items.length.toLocaleString()} matching parts`;
  const root=$("results");root.innerHTML="";
  items.slice(0,250).forEach(p=>root.appendChild(partCard(p)));
  if(items.length>250) root.insertAdjacentHTML("beforeend",`<div class="empty">Showing the first 250 results. Narrow the search to see a specific part.</div>`);
  if(!items.length) root.innerHTML=`<div class="empty">No matching parts found.</div>`;
}

function renderFavorites(){
  const root=$("favorites");root.innerHTML="";
  const items=CATALOG.filter(p=>favorites.includes(p.part_number));
  items.forEach(p=>root.appendChild(partCard(p)));
  if(!items.length) root.innerHTML=`<div class="empty">Tap ☆ on a part to save it here.</div>`;
}

function renderOrder(){
  const root=$("orderList");root.innerHTML="";
  const entries=Object.values(order).filter(x=>x.qty>0).sort((a,b)=>a.name.localeCompare(b.name));
  entries.forEach(item=>{
    const row=document.createElement("div");row.className="order-line";
    row.innerHTML=`<div><div class="order-name">${esc(item.name)}</div><div class="order-meta">Part # ${esc(item.part_number)} • Qty ${item.qty}</div></div><button class="small ghost" onclick="removeItem('${esc(item.part_number)}')">Remove</button>`;
    root.appendChild(row);
  });
  if(!entries.length) root.innerHTML=`<div class="empty">No parts selected yet.</div>`;
  const total=entries.reduce((s,x)=>s+x.qty,0);
  $("cartPill").textContent=`${total} item${total===1?"":"s"}`;
  $("preview").textContent=emailBody();
}

function changeQty(num,delta){
  const p=byNumber(num);if(!p)return;
  const qty=Math.max(0,selectedQty(num)+delta);
  if(!qty) delete order[num]; else order[num]={name:p.name,part_number:p.part_number,qty};
  save();renderAll();
}
function setQty(num,value){
  const p=byNumber(num);if(!p)return;
  const qty=Math.max(0,parseInt(value||"0",10));
  if(!qty) delete order[num]; else order[num]={name:p.name,part_number:p.part_number,qty};
  save();renderAll();
}
function removeItem(num){delete order[num];save();renderAll()}
function toggleFavorite(num){
  favorites=favorites.includes(num)?favorites.filter(x=>x!==num):[...favorites,num];
  save();renderAll();
}
function clearOrder(){
  if(!confirm("Clear the entire current order?"))return;
  order={};save();renderAll();
}
function formatDate(v){if(!v)return"";const [y,m,d]=v.split("-");return`${m}/${d}/${y}`}
function emailBody(){
  const entries=Object.values(order).filter(x=>x.qty>0).sort((a,b)=>a.name.localeCompare(b.name));
  const totalQty=entries.reduce((sum,item)=>sum+item.qty,0);

  let text=`Order Date: ${formatDate($("orderDate").value)}\n\n`;

  if(entries.length){
    text+=entries.map(x=>`${x.name} - ${x.part_number} x${x.qty}`).join("\n\n");
  }else{
    text+="No parts selected.";
  }

  const notes=$("notes").value.trim();
  if(notes){
    text+=`\n\n--------------------------------\n\nNotes\n\n${notes}`;
  }

  if(entries.length){
    text+=`\n\n--------------------------------\n\nTotal Line Items: ${entries.length}\nTotal Quantity: ${totalQty}`;
  }

  return text;
}
function openEmail(){
  const to=$("recipient").value.trim();
  if(!to){alert("Enter a recipient email.");return}
  localStorage.setItem(KEY.email,to);

  const entries=Object.values(order).filter(x=>x.qty>0);
  const totalQty=entries.reduce((sum,item)=>sum+item.qty,0);
  const subject=entries.length
    ? `Tech Pro Parts Order - ${entries.length} Line Item${entries.length===1?"":"s"} / ${totalQty} Total`
    : "Tech Pro Parts Order";

  location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody())}`;
}
async function copyEmail(){
  try{await navigator.clipboard.writeText(emailBody());alert("Order text copied.");}
  catch{alert("Copy was blocked. Select the preview text and copy it manually.");}
}
function showView(name){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("active",b.dataset.view===name));
  $("view"+name).classList.add("active");
  if(name==="Favorites")renderFavorites();
  if(name==="Order")renderOrder();
}
function chooseMachine(model){
  $("modelFilter").value=model;showView("Search");renderSearch();window.scrollTo({top:0,behavior:"smooth"});
}
function renderMachines(){
  const root=$("machineGrid");root.innerHTML="";
  MODELS.forEach(model=>{
    const count=CATALOG.filter(p=>p.models.includes(model)).length;
    const b=document.createElement("button");b.className="machine";
    b.innerHTML=`<strong>${esc(model)}</strong><small>${count.toLocaleString()} unique parts</small>`;
    b.onclick=()=>chooseMachine(model);root.appendChild(b);
  });
}
function renderAll(){renderSearch();renderFavorites();renderOrder()}

function init(){
  $("partCount").textContent=`${CATALOG.length.toLocaleString()} unique parts`;
  $("modelFilter").innerHTML=`<option value="">All Freestyle models</option>`+MODELS.map(m=>`<option>${esc(m)}</option>`).join("");
  $("orderDate").value=localStorage.getItem(KEY.date)||today();
  $("recipient").value=localStorage.getItem(KEY.email)||"Masonmentzer2001@gmail.com";
  $("notes").value=localStorage.getItem(KEY.notes)||"";
  $("search").addEventListener("input",renderSearch);
  $("modelFilter").addEventListener("change",renderSearch);
  $("orderDate").addEventListener("change",e=>{localStorage.setItem(KEY.date,e.target.value);renderOrder()});
  $("notes").addEventListener("input",e=>{localStorage.setItem(KEY.notes,e.target.value);renderOrder()});
  $("recipient").addEventListener("change",e=>localStorage.setItem(KEY.email,e.target.value));
  document.querySelectorAll(".navbtn").forEach(b=>b.onclick=()=>showView(b.dataset.view));
  renderMachines();renderAll();
}
init();
</script>
</body>
</html>
